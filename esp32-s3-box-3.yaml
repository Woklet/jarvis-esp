---
substitutions:
  name: esp32-s3-box-3
  friendly_name: ESP32 S3 Box 3 JARVIS

  voice_assist_idle_phase_id: "1"
  voice_assist_listening_phase_id: "2"
  voice_assist_thinking_phase_id: "3"
  voice_assist_replying_phase_id: "4"
  voice_assist_not_ready_phase_id: "10"
  voice_assist_error_phase_id: "11"
  voice_assist_muted_phase_id: "12"
  voice_assist_timer_finished_phase_id: "20"

  # These unique characters have been extracted from every test file of every language available on https://github.com/home-assistant/intents (14 March 2024)
  # However, the Figtree font only contains Latin characters, so there is no point using this... unlessyou change the font configuration accordingly.
  allowed_characters: " !#%'()+,-./0123456789:;<>?@ABCDEFGHIJKLMNOPQRSTUVWYZ[]_abcdefghijklmnopqrstuvwxyz{|}°²³µ¿ÁÂÄÅÉÖÚßàáâãäåæçèéêëìíîðñòóôõöøùúûüýþāăąćčďĐđēėęěğĮįıļľŁłńňőřśšťũūůűųźŻżŽžơưșțΆΈΌΐΑΒΓΔΕΖΗΘΚΜΝΠΡΣΤΥΦάέήίαβγδεζηθικλμνξοπρςστυφχψωϊόύώАБВГДЕЖЗИКЛМНОПРСТУХЦЧШЪЭЮЯабвгдежзийклмнопрстуфхцчшщъыьэюяёђєіїјљњћאבגדהוזחטיכלםמןנסעפץצקרשת،ءآأإئابةتجحخدذرزسشصضطظعغفقكلمنهوىيٹپچڈکگںھہیےংকচতধনফবযরলশষস়ািু্చయలిెొ్ംഅആഇഈഉഎഓകഗങചജഞടഡണതദധനപഫബഭമയരറലളവശസഹാിീുൂെേൈ്ൺൻർൽൾაბგდევზთილმნოპრსტუფქყშჩცძჭხạảấầẩậắặẹẽếềểệỉịọỏốồổỗộớờởợụủứừửữựỳ—、一上不个中为主乾了些亮人任低佔何作供依侧係個側偵充光入全关冇冷几切到制前動區卧厅厨及口另右吊后吗启吸呀咗哪唔問啟嗎嘅嘛器圍在场執場外多大始安定客室家密寵对將小少左已帘常幫幾库度庫廊廚廳开式後恆感態成我戲戶户房所扇手打执把拔换掉控插摄整斯新明是景暗更最會有未本模機檯櫃欄次正氏水沒没洗活派温測源溫漏潮激濕灯為無煙照熱燈燥物狀玄现現瓦用發的盞目着睡私空窗立笛管節簾籬紅線红罐置聚聲脚腦腳臥色节著行衣解設調請謝警设调走路車车运連遊運過道邊部都量鎖锁門閂閉開關门闭除隱離電震霧面音頂題顏颜風风食餅餵가간감갔강개거게겨결경고공과관그금급기길깥꺼껐꼽나난내네놀누는능니다닫담대더데도동됐되된됨둡드든등디때떤뜨라래러렇렌려로료른를리림링마많명몇모무문물뭐바밝방배변보부불블빨뽑사산상색서설성세센션소쇼수스습시신실싱아안않알았애야어얼업없었에여연열옆오온완외왼요운움워원위으은을음의이인일임입있작잠장재전절정제져조족종주줄중줘지직진짐쪽차창천최추출충치침커컴켜켰쿠크키탁탄태탬터텔통트튼티파팬퍼폰표퓨플핑한함해했행혀현화활후휴힘，？"

  # Add support for non-unicode characters by using better glyphset
  font_glyphsets: "GF_Latin_Core"
  # for Greek use "Noto Sans" for other languages use a compatible font family
  font_family: Figtree

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.4.0
  name_add_mac_suffix: true
  on_boot:
    priority: 600
    then:
      - script.execute: draw_display
      - delay: 30s
      - if:
          condition:
            lambda: return id(init_in_progress);
          then:
            - lambda: id(init_in_progress) = false;
            - script.execute: draw_display

esp32:
  board: esp32s3box
  flash_size: 16MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"

psram:
  mode: octal
  speed: 80MHz

api:
  encryption:
    key: !secret api_encryption_key
  on_client_connected:
    - script.execute: draw_display
  on_client_disconnected:
    - script.execute: draw_display

ota:
  - platform: esphome
    id: ota_esphome
    password: !secret ota_password

logger:
  hardware_uart: USB_SERIAL_JTAG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
  on_connect:
    - script.execute: draw_display
  on_disconnect:
    - script.execute: draw_display

captive_portal:

button:
  - platform: factory_reset
    id: factory_reset_btn
    internal: true

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      ignore_strapping_warning: true
      mode: INPUT_PULLUP
      inverted: true
    id: left_top_button
    internal: true
    on_multi_click:
      - timing:
          - ON for at least 50ms
          - OFF for at least 50ms
        then:
          - switch.turn_off: timer_ringing
      - timing:
          - ON for at least 10s
        then:
          - button.press: factory_reset_btn
  - platform: gpio
    pin:
      number: GPIO1
      mode: INPUT_PULLUP
      inverted: true
    id: mute_button
    internal: true
    on_press:
      - switch.toggle: mute
  - platform: gpio
    pin:
      number: GPIO21
      mode: INPUT
    id: presence_sensor
    name: "Presence"
    device_class: occupancy

output:
  - platform: ledc
    pin: GPIO47
    id: backlight_output

light:
  - platform: monochromatic
    id: led
    name: Screen
    icon: "mdi:television"
    entity_category: config
    output: backlight_output
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms

i2c:
  - id: i2c_adc_dac
    scl: GPIO18
    sda: GPIO8
  - id: i2c_dock
    sda: GPIO41
    scl: GPIO40
    scan: false
    sda_pullup_enabled: true
    scl_pullup_enabled: true
    frequency: 100kHz

i2s_audio:
  - id: i2s_audio_bus
    i2s_lrclk_pin:
      number: GPIO45
      ignore_strapping_warning: true
    i2s_bclk_pin: GPIO17
    i2s_mclk_pin: GPIO2

audio_adc:
  - platform: es7210
    i2c_id: i2c_adc_dac
    id: es7210_adc
    bits_per_sample: 16bit
    sample_rate: 16000

audio_dac:
  - platform: es8311
    i2c_id: i2c_adc_dac
    id: es8311_dac
    bits_per_sample: 16bit
    sample_rate: 48000

microphone:
  - platform: i2s_audio
    id: box_mic
    sample_rate: 16000
    i2s_din_pin: GPIO16
    bits_per_sample: 16bit
    adc_type: external

speaker:
  - platform: i2s_audio
    id: box_speaker
    i2s_dout_pin: GPIO15
    dac_type: external
    sample_rate: 48000
    bits_per_sample: 16bit
    channel: left
    audio_dac: es8311_dac
    buffer_duration: 100ms

media_player:
  - platform: speaker
    name: None
    id: speaker_media_player
    volume_min: 0.5
    volume_max: 0.8
    announcement_pipeline:
      speaker: box_speaker
      format: FLAC
      sample_rate: 48000
      num_channels: 1  # S3 Box only has one output channel
    files:
      - id: timer_finished_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/timer_finished.flac
    on_announcement:
      # Stop the wake word (mWW or VA) if the mic is capturing
      - if:
          condition:
            - microphone.is_capturing:
          then:
            - script.execute: stop_wake_word
            # Ensure VA stops before moving on
            - if:
                condition:
                  - lambda: return id(wake_word_engine_location).current_option() == "In Home Assistant";
                then:
                  - wait_until:
                      - not:
                          voice_assistant.is_running:
      # Since VA isn't running, this is user-intiated media playback. Draw the mute display
      - if:
          condition:
            not:
              voice_assistant.is_running:
          then:
            - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
            - script.execute: draw_display
    on_idle:
      # Since VA isn't running, this is the end of user-intiated media playback. Restart the wake word.
      - if:
          condition:
            not:
              voice_assistant.is_running:
          then:
            - script.execute: start_wake_word
            - script.execute: set_idle_or_mute_phase
            - script.execute: draw_display

micro_wake_word:
  id: mww
  models:
    - okay_nabu
    - hey_mycroft
    - hey_jarvis
  on_wake_word_detected:
    - voice_assistant.start:
        wake_word: !lambda return wake_word;

voice_assistant:
  id: va
  microphone: box_mic
  media_player: speaker_media_player
  micro_wake_word: mww
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0
  on_listening:
    - lambda: id(voice_assistant_phase) = ${voice_assist_listening_phase_id};
    - text_sensor.template.publish:
        id: text_request
        state: "..."
    - text_sensor.template.publish:
        id: text_response
        state: "..."
    - script.execute: draw_display
  on_stt_vad_end:
    - lambda: id(voice_assistant_phase) = ${voice_assist_thinking_phase_id};
    - script.execute: draw_display
  on_stt_end:
    - text_sensor.template.publish:
        id: text_request
        state: !lambda return x;
    - script.execute: draw_display
  on_tts_start:
    - text_sensor.template.publish:
        id: text_response
        state: !lambda return x;
    - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
    - script.execute: draw_display
  on_end:
    # Wait a short amount of time to see if an announcement starts
    - wait_until:
        condition:
          - media_player.is_announcing:
        timeout: 0.5s
    # Announcement is finished and the I2S bus is free
    - wait_until:
        - and:
            - not:
                media_player.is_announcing:
            - not:
                speaker.is_playing:
    # Restart only mWW if enabled; streaming wake words automatically restart
    - if:
        condition:
          - lambda: return id(wake_word_engine_location).current_option() == "On device";
        then:
          - lambda: id(va).set_use_wake_word(false);
          - micro_wake_word.start:
    - script.execute: set_idle_or_mute_phase
    - script.execute: draw_display
    # Clear text sensors
    - text_sensor.template.publish:
        id: text_request
        state: ""
    - text_sensor.template.publish:
        id: text_response
        state: ""
  on_error:
    - if:
        condition:
          lambda: return !id(init_in_progress);
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
          - script.execute: draw_display
          - delay: 1s
          - if:
              condition:
                switch.is_off: mute
              then:
                - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
              else:
                - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
          - script.execute: draw_display
  on_client_connected:
    - lambda: id(init_in_progress) = false;
    - script.execute: start_wake_word
    - script.execute: set_idle_or_mute_phase
    - script.execute: draw_display
  on_client_disconnected:
    - script.execute: stop_wake_word
    - lambda: id(voice_assistant_phase) = ${voice_assist_not_ready_phase_id};
    - script.execute: draw_display
  on_timer_started:
    - script.execute: draw_display
  on_timer_cancelled:
    - script.execute: draw_display
  on_timer_updated:
    - script.execute: draw_display
  on_timer_tick:
    - script.execute: draw_display
  on_timer_finished:
    - switch.turn_on: timer_ringing
    - wait_until:
        media_player.is_announcing:
    - lambda: id(voice_assistant_phase) = ${voice_assist_timer_finished_phase_id};
    - script.execute: draw_display

script:
  - id: draw_display
    then:
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - if:
                condition:
                  wifi.connected:
                then:
                  - if:
                      condition:
                        api.connected:
                      then:
                        - lambda: |
                            switch(id(voice_assistant_phase)) {
                              case ${voice_assist_listening_phase_id}:
                                id(s3_box_lcd).show_page(listening_page);
                                id(s3_box_lcd).update();
                                break;
                              case ${voice_assist_thinking_phase_id}:
                                id(s3_box_lcd).show_page(thinking_page);
                                id(s3_box_lcd).update();
                                break;
                              case ${voice_assist_replying_phase_id}:
                                id(s3_box_lcd).show_page(replying_page);
                                id(s3_box_lcd).update();
                                break;
                              case ${voice_assist_error_phase_id}:
                                id(s3_box_lcd).show_page(error_page);
                                id(s3_box_lcd).update();
                                break;
                              case ${voice_assist_muted_phase_id}:
                                id(s3_box_lcd).show_page(muted_page);
                                id(s3_box_lcd).update();
                                break;
                              case ${voice_assist_not_ready_phase_id}:
                                id(s3_box_lcd).show_page(no_ha_page);
                                id(s3_box_lcd).update();
                                break;
                              case ${voice_assist_timer_finished_phase_id}:
                                id(s3_box_lcd).show_page(timer_finished_page);
                                id(s3_box_lcd).update();
                                break;
                              default:
                                id(s3_box_lcd).show_page(idle_page);
                                id(s3_box_lcd).update();
                            }
                      else:
                        - display.page.show: no_ha_page
                        - component.update: s3_box_lcd
                else:
                  - display.page.show: no_wifi_page
                  - component.update: s3_box_lcd
          else:
            - display.page.show: initializing_page
            - component.update: s3_box_lcd

  - id: fetch_first_active_timer
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          auto output_timer = *timers.begin();
          for (const auto &timer : timers) {
            if (timer.is_active && timer.seconds_left <= output_timer.seconds_left) {
              output_timer = timer;
            }
          }
          id(global_first_active_timer) = output_timer;
  - id: check_if_timers_active
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          bool output = false;
          for (const auto &timer : timers) {
            if (timer.is_active) {
              output = true;
            }
          }
          id(global_is_timer_active) = output;
  - id: fetch_first_timer
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          auto output_timer = *timers.begin();
          for (const auto &timer : timers) {
            if (timer.seconds_left <= output_timer.seconds_left) {
              output_timer = timer;
            }
          }
          id(global_first_timer) = output_timer;
  - id: check_if_timers
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          bool output = false;
          for (const auto &timer : timers) {
            if (timer.is_active) {
              output = true;
            }
          }
          id(global_is_timer) = output;

  - id: draw_timer_timeline
    then:
      - lambda: |
          id(check_if_timers_active).execute();
          id(check_if_timers).execute();
          if (id(global_is_timer_active)){
            id(fetch_first_active_timer).execute();
            int active_pixels = round( 320 * id(global_first_active_timer).seconds_left / max(id(global_first_active_timer).total_seconds , static_cast<uint32_t>(1)) );
            if (active_pixels > 0){
              id(s3_box_lcd).filled_rectangle(0 , 225 , 320 , 15 , Color::WHITE );
              id(s3_box_lcd).filled_rectangle(0 , 226 , active_pixels , 13 , id(active_timer_color) );
            }
          } else if (id(global_is_timer)){
            id(fetch_first_timer).execute();
            int active_pixels = round( 320 * id(global_first_timer).seconds_left / max(id(global_first_timer).total_seconds , static_cast<uint32_t>(1)));
            if (active_pixels > 0){
              id(s3_box_lcd).filled_rectangle(0 , 225 , 320 , 15 , Color::WHITE );
              id(s3_box_lcd).filled_rectangle(0 , 226 , active_pixels , 13 , id(paused_timer_color) );
            }
          }
  - id: draw_active_timer_widget
    then:
      - lambda: |
          id(check_if_timers_active).execute();
          if (id(global_is_timer_active)){
            id(s3_box_lcd).filled_rectangle(80 , 40 , 160 , 50 , Color::WHITE );
            id(s3_box_lcd).rectangle(80 , 40 , 160 , 50 , Color::BLACK );

            id(fetch_first_active_timer).execute();
            int hours_left = floor(id(global_first_active_timer).seconds_left / 3600);
            int minutes_left = floor((id(global_first_active_timer).seconds_left - hours_left * 3600) / 60);
            int seconds_left = id(global_first_active_timer).seconds_left - hours_left * 3600 - minutes_left * 60 ;
            auto display_hours = (hours_left < 10 ? "0" : "") + std::to_string(hours_left);
            auto display_minute = (minutes_left < 10 ? "0" : "") + std::to_string(minutes_left);
            auto display_seconds = (seconds_left  < 10 ? "0" : "") + std::to_string(seconds_left) ;

            std::string display_string = "";
            if (hours_left > 0) {
              display_string = display_hours + ":" + display_minute;
            } else {
              display_string = display_minute + ":" + display_seconds;
            }
            id(s3_box_lcd).printf(120, 47, id(font_timer), Color::BLACK, "%s", display_string.c_str());
          }
  # Starts either mWW or the streaming wake word, depending on the configured location
  - id: start_wake_word
    then:
      - if:
          condition:
            and:
              - not:
                  - voice_assistant.is_running:
              - lambda: return id(wake_word_engine_location).current_option() == "On device";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - micro_wake_word.start:
      - if:
          condition:
            and:
              - not:
                  - voice_assistant.is_running:
              - lambda: return id(wake_word_engine_location).current_option() == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(true);
            - voice_assistant.start_continuous:
  # Stops either mWW or the streaming wake word, depending on the configured location
  - id: stop_wake_word
    then:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).current_option() == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - voice_assistant.stop:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).current_option() == "On device";
          then:
            - micro_wake_word.stop:
  # Set the voice assistant phase to idle or muted, depending on if the software mute switch is activated
  - id: set_idle_or_mute_phase
    then:
      - if:
          condition:
            switch.is_off: mute
          then:
            - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
          else:
            - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};

switch:
  - platform: gpio
    name: Speaker Enable
    pin:
      number: GPIO46
      ignore_strapping_warning: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    disabled_by_default: true
  - platform: gpio
    name: "IR Power"
    icon: "mdi:led-variant-on"
    entity_category: config
    restore_mode: RESTORE_DEFAULT_ON
    pin:
      number: GPIO44
      inverted: true
    id: ir_power
  - platform: template
    name: Mute
    id: mute
    icon: "mdi:microphone-off"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    on_turn_off:
      - microphone.unmute:
      - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
      - script.execute: draw_display
    on_turn_on:
      - microphone.mute:
      - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
      - script.execute: draw_display
  - platform: template
    id: timer_ringing
    optimistic: true
    internal: true
    restore_mode: ALWAYS_OFF
    on_turn_off:
      # Turn off the repeat mode and disable the pause between playlist items
      - lambda: |-
              id(speaker_media_player)
                ->make_call()
                .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_REPEAT_OFF)
                .set_announcement(true)
                .perform();
              id(speaker_media_player)->set_playlist_delay_ms(speaker::AudioPipelineType::ANNOUNCEMENT, 0);
      # Stop playing the alarm
      - media_player.stop:
          announcement: true
    on_turn_on:
      # Turn on the repeat mode and pause for 1000 ms between playlist items/repeats
      - lambda: |-
            id(speaker_media_player)
              ->make_call()
              .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_REPEAT_ONE)
              .set_announcement(true)
              .perform();
            id(speaker_media_player)->set_playlist_delay_ms(speaker::AudioPipelineType::ANNOUNCEMENT, 1000);
      - media_player.speaker.play_on_device_media_file:
          media_file: timer_finished_sound
          announcement: true
      - delay: 15min
      - switch.turn_off: timer_ringing

select:
  - platform: template
    entity_category: config
    name: Wake word engine location
    id: wake_word_engine_location
    icon: "mdi:account-voice"
    optimistic: true
    restore_value: true
    options:
      - In Home Assistant
      - On device
    initial_option: On device
    on_value:
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - wait_until:
                lambda: return id(voice_assistant_phase) == ${voice_assist_muted_phase_id} || id(voice_assistant_phase) == ${voice_assist_idle_phase_id};
            - if:
                condition:
                  lambda: return x == "In Home Assistant";
                then:
                  - micro_wake_word.stop
                  - delay: 500ms
                  - if:
                      condition:
                        switch.is_off: mute
                      then:
                        - lambda: id(va).set_use_wake_word(true);
                        - voice_assistant.start_continuous:
            - if:
                condition:
                  lambda: return x == "On device";
                then:
                  - lambda: id(va).set_use_wake_word(false);
                  - voice_assistant.stop
                  - delay: 500ms
                  - if:
                      condition:
                        switch.is_off: mute
                      then:
                        - micro_wake_word.start

globals:
  - id: init_in_progress
    type: bool
    restore_value: false
    initial_value: "true"
  - id: voice_assistant_phase
    type: int
    restore_value: false
    initial_value: ${voice_assist_not_ready_phase_id}
  - id: global_first_active_timer
    type: voice_assistant::Timer
    restore_value: false
  - id: global_is_timer_active
    type: bool
    restore_value: false
  - id: global_first_timer
    type: voice_assistant::Timer
    restore_value: false
  - id: global_is_timer
    type: bool
    restore_value: false
  - id: frame_tick
    type: int
    restore_value: false
    initial_value: "0"

interval:
  - interval: 80ms
    then:
      - if:
          condition:
            lambda: |-
              int p = id(voice_assistant_phase);
              return p == ${voice_assist_listening_phase_id}
                  || p == ${voice_assist_thinking_phase_id}
                  || p == ${voice_assist_replying_phase_id}
                  || p == ${voice_assist_timer_finished_phase_id};
          then:
            - lambda: id(frame_tick) += 1;
            - script.execute: draw_display
  - interval: 800ms
    then:
      - if:
          condition:
            lambda: |-
              int p = id(voice_assistant_phase);
              return p == ${voice_assist_idle_phase_id}
                  || p == ${voice_assist_not_ready_phase_id}
                  || p == ${voice_assist_error_phase_id};
          then:
            - lambda: id(frame_tick) += 1;
            - script.execute: draw_display

font:
  - file:
      type: gfonts
      family: ${font_family}
      weight: 300
      italic: true
    id: font_request
    size: 15
    glyphsets:
      - ${font_glyphsets}
  - file:
      type: gfonts
      family: ${font_family}
      weight: 300
    id: font_response
    size: 15
    glyphsets:
      - ${font_glyphsets}
  - file:
      type: gfonts
      family: ${font_family}
      weight: 300
    id: font_timer
    size: 30
    glyphsets:
      - ${font_glyphsets}

text_sensor:
  - id: text_request
    platform: template
    on_value:
      lambda: |-
        if(id(text_request).state.length()>32) {
          std::string name = id(text_request).state.c_str();
          std::string truncated = esphome::str_truncate(name.c_str(),31);
          id(text_request).state = (truncated+"...").c_str();
        }

  - id: text_response
    platform: template
    on_value:
      lambda: |-
        if(id(text_response).state.length()>32) {
          std::string name = id(text_response).state.c_str();
          std::string truncated = esphome::str_truncate(name.c_str(),31);
          id(text_response).state = (truncated+"...").c_str();
        }

# ----- Sensor Dock -----
sensor:
  - platform: aht10
    i2c_id: i2c_dock
    variant: AHT20
    temperature:
      name: "Temperature"
      id: dock_temperature
    humidity:
      name: "Humidity"
      id: dock_humidity
    update_interval: 60s

  - platform: adc
    pin: GPIO10
    name: "Battery Voltage"
    id: battery_voltage
    unit_of_measurement: "V"
    accuracy_decimals: 2
    device_class: voltage
    entity_category: diagnostic
    update_interval: 30s
    attenuation: auto
    filters:
      - multiply: 4.11

  - platform: copy
    source_id: battery_voltage
    name: "Battery Level"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    device_class: battery
    entity_category: diagnostic
    filters:
      - lambda: return (x - 2.7) / (4.2 - 2.7) * 100;
      - clamp:
          min_value: 0
          max_value: 100

remote_receiver:
  id: ir_rx
  pin:
    number: GPIO38
    inverted: true
  dump: pronto
  rmt_symbols: 192
  buffer_size: 2kb

remote_transmitter:
  id: ir_tx
  pin:
    number: GPIO39
    inverted: false
  carrier_duty_percent: 50%

color:
  - id: jarvis_bg
    hex: "000000"
  - id: jarvis_cyan_bright
    hex: "00DDFF"
  - id: jarvis_cyan_mid
    hex: "0088CC"
  - id: jarvis_cyan_dim
    hex: "00384D"
  - id: jarvis_cyan_glow
    hex: "66EEFF"
  - id: jarvis_white
    hex: "E0F8FF"
  - id: jarvis_red
    hex: "FF3030"
  - id: jarvis_red_dim
    hex: "551010"
  - id: jarvis_amber
    hex: "FFAA00"
  - id: jarvis_gray
    hex: "404040"
  - id: active_timer_color
    hex: "26ed3a"
  - id: paused_timer_color
    hex: "3b89e3"

spi:
  - id: spi_bus
    clk_pin: 7
    mosi_pin: 6

display:
  - platform: mipi_spi
    id: s3_box_lcd
    model: S3BOX
    invert_colors: false
    data_rate: 40MHz
    cs_pin: 5
    dc_pin: 4
    reset_pin:
      number: 48
      inverted: true
    update_interval: never
    pages:
      # ----- IDLE -----
      - id: idle_page
        lambda: |-
          const int CX = 160, CY = 120;
          int t = id(frame_tick);
          // Slow breathing core radius 12..18
          int core_r = 14 + (int)(2.0f * sinf(t * 0.35f));
          it.fill(id(jarvis_bg));
          // Static dim ring frame
          it.circle(CX, CY, 110, id(jarvis_cyan_dim));
          it.circle(CX, CY, 88,  id(jarvis_cyan_dim));
          it.circle(CX, CY, 60,  id(jarvis_cyan_dim));
          // 12 tick marks
          for (int i = 0; i < 12; i++) {
            float a = i * (2.0f * (float)M_PI / 12.0f);
            int x1 = CX + (int)(105 * cosf(a));
            int y1 = CY + (int)(105 * sinf(a));
            int x2 = CX + (int)(116 * cosf(a));
            int y2 = CY + (int)(116 * sinf(a));
            it.line(x1, y1, x2, y2, id(jarvis_cyan_dim));
          }
          // Centre core (breathing)
          it.filled_circle(CX, CY, core_r, id(jarvis_cyan_mid));
          it.circle(CX, CY, core_r + 3, id(jarvis_cyan_bright));
          id(draw_timer_timeline).execute();
          id(draw_active_timer_widget).execute();

      # ----- LISTENING -----
      - id: listening_page
        lambda: |-
          const int CX = 160, CY = 120;
          int t = id(frame_tick);
          int core_r = 22 + (int)(4.0f * sinf(t * 0.6f));
          it.fill(id(jarvis_bg));
          // Bright ring frame
          it.circle(CX, CY, 110, id(jarvis_cyan_bright));
          it.circle(CX, CY, 88,  id(jarvis_cyan_mid));
          it.circle(CX, CY, 60,  id(jarvis_cyan_bright));
          // 12 tick marks all bright
          for (int i = 0; i < 12; i++) {
            float a = i * (2.0f * (float)M_PI / 12.0f);
            int x1 = CX + (int)(104 * cosf(a));
            int y1 = CY + (int)(104 * sinf(a));
            int x2 = CX + (int)(118 * cosf(a));
            int y2 = CY + (int)(118 * sinf(a));
            it.line(x1, y1, x2, y2, id(jarvis_cyan_bright));
          }
          // Pulsing core
          it.filled_circle(CX, CY, core_r, id(jarvis_cyan_bright));
          it.filled_circle(CX, CY, core_r - 6, id(jarvis_white));
          // Expanding listen halo (3 rings, growing & fading by phase)
          for (int k = 0; k < 3; k++) {
            int r = 30 + ((t * 4 + k * 14) % 60);
            if (r < 78) it.circle(CX, CY, r, id(jarvis_cyan_glow));
          }
          id(draw_timer_timeline).execute();

      # ----- THINKING -----
      - id: thinking_page
        lambda: |-
          const int CX = 160, CY = 120;
          int t = id(frame_tick);
          it.fill(id(jarvis_bg));
          it.circle(CX, CY, 110, id(jarvis_cyan_mid));
          it.circle(CX, CY, 88,  id(jarvis_cyan_dim));
          it.circle(CX, CY, 60,  id(jarvis_cyan_mid));
          // 12 chase dots on outer ring; light up 4 trailing
          int head = t % 12;
          for (int i = 0; i < 12; i++) {
            float a = i * (2.0f * (float)M_PI / 12.0f) - (float)M_PI / 2.0f;
            int dx = CX + (int)(110 * cosf(a));
            int dy = CY + (int)(110 * sinf(a));
            int dist = (head - i + 12) % 12;
            if (dist == 0)      it.filled_circle(dx, dy, 5, id(jarvis_white));
            else if (dist == 1) it.filled_circle(dx, dy, 4, id(jarvis_cyan_bright));
            else if (dist == 2) it.filled_circle(dx, dy, 3, id(jarvis_cyan_mid));
            else if (dist == 3) it.filled_circle(dx, dy, 2, id(jarvis_cyan_dim));
          }
          // Inner counter-rotating ring of 8 small ticks
          int head2 = (t / 2) % 8;
          for (int i = 0; i < 8; i++) {
            float a = -i * (2.0f * (float)M_PI / 8.0f) + (float)M_PI / 2.0f;
            int dx = CX + (int)(60 * cosf(a));
            int dy = CY + (int)(60 * sinf(a));
            if (i == head2) it.filled_circle(dx, dy, 3, id(jarvis_cyan_bright));
            else            it.filled_circle(dx, dy, 2, id(jarvis_cyan_dim));
          }
          // Solid core
          it.filled_circle(CX, CY, 18, id(jarvis_cyan_mid));
          it.circle(CX, CY, 22, id(jarvis_cyan_bright));
          // Request text along top
          if (id(text_request).state.length() > 0) {
            it.printf(CX, 18, id(font_request), id(jarvis_cyan_bright),
                      TextAlign::TOP_CENTER, "%s", id(text_request).state.c_str());
          }
          id(draw_timer_timeline).execute();

      # ----- REPLYING -----
      - id: replying_page
        lambda: |-
          const int CX = 160, CY = 120;
          int t = id(frame_tick);
          it.fill(id(jarvis_bg));
          it.circle(CX, CY, 110, id(jarvis_cyan_bright));
          it.circle(CX, CY, 88,  id(jarvis_cyan_mid));
          it.circle(CX, CY, 60,  id(jarvis_cyan_bright));
          for (int i = 0; i < 12; i++) {
            float a = i * (2.0f * (float)M_PI / 12.0f);
            int x1 = CX + (int)(104 * cosf(a));
            int y1 = CY + (int)(104 * sinf(a));
            int x2 = CX + (int)(118 * cosf(a));
            int y2 = CY + (int)(118 * sinf(a));
            it.line(x1, y1, x2, y2, id(jarvis_cyan_bright));
          }
          // Bright core
          it.filled_circle(CX, CY, 22, id(jarvis_cyan_bright));
          it.filled_circle(CX, CY, 14, id(jarvis_white));
          // Audio bars: 9 vertical bars each side of core (within inner ring), animated
          for (int i = 0; i < 9; i++) {
            float ph = (t * 0.55f) + i * 0.7f;
            int h = 4 + (int)(14.0f * fabsf(sinf(ph)));
            int xL = CX - 50 + i * 4;
            int xR = CX + 18 + i * 4;
            it.filled_rectangle(xL, CY - h/2, 2, h, id(jarvis_cyan_glow));
            it.filled_rectangle(xR, CY - h/2, 2, h, id(jarvis_cyan_glow));
          }
          // Response text along bottom
          if (id(text_response).state.length() > 0) {
            it.printf(CX, 222, id(font_response), id(jarvis_cyan_bright),
                      TextAlign::BOTTOM_CENTER, "%s", id(text_response).state.c_str());
          }
          if (id(text_request).state.length() > 0) {
            it.printf(CX, 18, id(font_request), id(jarvis_cyan_dim),
                      TextAlign::TOP_CENTER, "%s", id(text_request).state.c_str());
          }
          id(draw_timer_timeline).execute();

      # ----- TIMER FINISHED -----
      - id: timer_finished_page
        lambda: |-
          const int CX = 160, CY = 120;
          int t = id(frame_tick);
          bool flash = (t % 6) < 3;
          auto col = flash ? id(jarvis_amber) : id(jarvis_red);
          it.fill(id(jarvis_bg));
          it.circle(CX, CY, 110, col);
          it.circle(CX, CY, 108, col);
          it.circle(CX, CY, 88,  col);
          it.circle(CX, CY, 60,  col);
          for (int i = 0; i < 12; i++) {
            float a = i * (2.0f * (float)M_PI / 12.0f);
            int x1 = CX + (int)(104 * cosf(a));
            int y1 = CY + (int)(104 * sinf(a));
            int x2 = CX + (int)(118 * cosf(a));
            int y2 = CY + (int)(118 * sinf(a));
            it.line(x1, y1, x2, y2, col);
          }
          it.printf(CX, CY, id(font_timer), col, TextAlign::CENTER, "TIMER");

      # ----- ERROR -----
      - id: error_page
        lambda: |-
          const int CX = 160, CY = 120;
          it.fill(id(jarvis_bg));
          it.circle(CX, CY, 110, id(jarvis_red));
          it.circle(CX, CY, 88,  id(jarvis_red_dim));
          it.circle(CX, CY, 60,  id(jarvis_red));
          for (int i = 0; i < 12; i++) {
            float a = i * (2.0f * (float)M_PI / 12.0f);
            int x1 = CX + (int)(104 * cosf(a));
            int y1 = CY + (int)(104 * sinf(a));
            int x2 = CX + (int)(118 * cosf(a));
            int y2 = CY + (int)(118 * sinf(a));
            it.line(x1, y1, x2, y2, id(jarvis_red));
          }
          // X across centre
          it.line(CX - 22, CY - 22, CX + 22, CY + 22, id(jarvis_red));
          it.line(CX - 22, CY + 22, CX + 22, CY - 22, id(jarvis_red));
          it.line(CX - 21, CY - 22, CX + 23, CY + 22, id(jarvis_red));
          it.line(CX - 21, CY + 22, CX + 23, CY - 22, id(jarvis_red));
          it.printf(CX, 222, id(font_response), id(jarvis_red),
                    TextAlign::BOTTOM_CENTER, "ERROR");

      # ----- NO HA -----
      - id: no_ha_page
        lambda: |-
          const int CX = 160, CY = 120;
          it.fill(id(jarvis_bg));
          it.circle(CX, CY, 110, id(jarvis_cyan_dim));
          it.circle(CX, CY, 88,  id(jarvis_cyan_dim));
          it.circle(CX, CY, 60,  id(jarvis_cyan_dim));
          it.printf(CX, CY - 8, id(font_response), id(jarvis_cyan_bright),
                    TextAlign::CENTER, "OFFLINE");
          it.printf(CX, CY + 16, id(font_request), id(jarvis_cyan_mid),
                    TextAlign::CENTER, "no Home Assistant");

      # ----- NO WIFI -----
      - id: no_wifi_page
        lambda: |-
          const int CX = 160, CY = 120;
          it.fill(id(jarvis_bg));
          it.circle(CX, CY, 110, id(jarvis_cyan_dim));
          it.circle(CX, CY, 88,  id(jarvis_cyan_dim));
          it.circle(CX, CY, 60,  id(jarvis_cyan_dim));
          it.printf(CX, CY - 8, id(font_response), id(jarvis_amber),
                    TextAlign::CENTER, "NO WIFI");
          it.printf(CX, CY + 16, id(font_request), id(jarvis_cyan_mid),
                    TextAlign::CENTER, "join AP to configure");

      # ----- INITIALIZING -----
      - id: initializing_page
        lambda: |-
          const int CX = 160, CY = 120;
          int t = id(frame_tick);
          it.fill(id(jarvis_bg));
          it.circle(CX, CY, 110, id(jarvis_cyan_dim));
          it.circle(CX, CY, 88,  id(jarvis_cyan_dim));
          it.circle(CX, CY, 60,  id(jarvis_cyan_dim));
          // Single rotating dot to show life
          float a = (t * 0.4f) - (float)M_PI / 2.0f;
          int dx = CX + (int)(110 * cosf(a));
          int dy = CY + (int)(110 * sinf(a));
          it.filled_circle(dx, dy, 4, id(jarvis_cyan_bright));
          it.printf(CX, CY, id(font_response), id(jarvis_cyan_bright),
                    TextAlign::CENTER, "BOOT");

      # ----- MUTED -----
      - id: muted_page
        lambda: |-
          const int CX = 160, CY = 120;
          it.fill(id(jarvis_bg));
          it.circle(CX, CY, 110, id(jarvis_gray));
          it.circle(CX, CY, 88,  id(jarvis_gray));
          it.circle(CX, CY, 60,  id(jarvis_gray));
          // Slash through centre
          it.line(CX - 60, CY - 60, CX + 60, CY + 60, id(jarvis_red));
          it.line(CX - 59, CY - 60, CX + 61, CY + 60, id(jarvis_red));
          it.printf(CX, 222, id(font_response), id(jarvis_gray),
                    TextAlign::BOTTOM_CENTER, "MUTED");
          id(draw_timer_timeline).execute();
          id(draw_active_timer_widget).execute();
